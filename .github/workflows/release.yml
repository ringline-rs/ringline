name: Release

on:
  push:
    tags:
      - 'v*'
      - 'ringline-*-v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  publish:
    name: Publish to crates.io
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG"

          if [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            # Workspace release: v0.1.0
            echo "mode=workspace" >> $GITHUB_OUTPUT
            echo "version=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          elif [[ "$TAG" =~ ^([a-z-]+)-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            # Per-crate release: ringline-redis-v0.2.1
            echo "mode=crate" >> $GITHUB_OUTPUT
            echo "crate=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "version=${BASH_REMATCH[2]}" >> $GITHUB_OUTPUT
          else
            echo "ERROR: Unrecognized tag format: $TAG"
            exit 1
          fi

      - name: Verify version (workspace)
        if: steps.parse.outputs.mode == 'workspace'
        run: |
          TAG_VERSION="${{ steps.parse.outputs.version }}"
          CARGO_VERSION=$(grep '^version = ' ringline/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "ERROR: Tag v$TAG_VERSION does not match ringline/Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Verify version (crate)
        if: steps.parse.outputs.mode == 'crate'
        run: |
          CRATE="${{ steps.parse.outputs.crate }}"
          TAG_VERSION="${{ steps.parse.outputs.version }}"
          CRATE_PATH="${CRATE}/Cargo.toml"
          CARGO_VERSION=$(grep '^version = ' "$CRATE_PATH" | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "ERROR: Tag version $TAG_VERSION does not match $CRATE_PATH version $CARGO_VERSION"
            exit 1
          fi

      - name: Publish workspace crates
        if: steps.parse.outputs.mode == 'workspace'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Publish in dependency order. Skip crates already published at
          # their current version (allows re-running without failure).
          publish_if_needed() {
            local crate="$1"
            local version
            version=$(cargo metadata --no-deps --format-version 1 \
              | jq -r ".packages[] | select(.name == \"$crate\") | .version")

            # Best-effort pre-check via the crates.io API. May come back empty
            # on rate limit or transient API failure, in which case we fall
            # through to `cargo publish` and rely on the post-attempt grep
            # for "already exists" to short-circuit cleanly.
            local published
            published=$(curl -s "https://crates.io/api/v1/crates/$crate/$version" \
              | jq -r '.version.num // empty')

            if [ "$published" = "$version" ]; then
              echo "  $crate v$version — already published, skipping"
              return 0
            fi

            # Publish with retry on rate limit (HTTP 429). Treat "already
            # exists" as success so a flaky API check doesn't loop us for
            # 15 minutes on a no-op crate.
            local attempt
            for attempt in $(seq 1 15); do
              echo "  $crate v$version — publishing (attempt $attempt)..."
              local output
              if output=$(cargo publish -p "$crate" 2>&1); then
                echo "$output"
                sleep 30
                return 0
              fi
              echo "$output"

              if echo "$output" | grep -q "already exists on crates.io index"; then
                echo "  $crate v$version — already published (API check missed), skipping"
                return 0
              fi

              if [ "$attempt" -lt 15 ]; then
                echo "  $crate — publish failed, retrying in 60s..."
                sleep 60
              fi
            done

            echo "  ERROR: $crate failed after 15 attempts"
            return 1
          }

          echo "=== Publishing workspace crates ==="

          # Tier 0: core runtime (no workspace deps)
          publish_if_needed ringline

          # Tier 1: crates that depend only on ringline or external crates
          publish_if_needed ringline-h2
          publish_if_needed ringline-quic
          publish_if_needed ringline-redis
          publish_if_needed ringline-memcache
          publish_if_needed ringline-momento
          publish_if_needed ringline-ping

          # Tier 2: crates that depend on other workspace crates
          publish_if_needed ringline-h3
          publish_if_needed ringline-grpc
          publish_if_needed ringline-http

          echo "=== Done ==="

      - name: Publish single crate
        if: steps.parse.outputs.mode == 'crate'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          CRATE="${{ steps.parse.outputs.crate }}"
          VERSION="${{ steps.parse.outputs.version }}"

          # Check if already published.
          PUBLISHED=$(curl -s "https://crates.io/api/v1/crates/$CRATE/$VERSION" \
            | jq -r '.version.num // empty')

          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "$CRATE v$VERSION — already published, skipping"
            exit 0
          fi

          # Publish with retry. Treat "already exists" as success so a
          # flaky API check doesn't loop us on a no-op republish.
          for attempt in $(seq 1 15); do
            echo "$CRATE v$VERSION — publishing (attempt $attempt)..."
            if output=$(cargo publish -p "$CRATE" 2>&1); then
              echo "$output"
              echo "Published $CRATE v$VERSION"
              exit 0
            fi
            echo "$output"

            if echo "$output" | grep -q "already exists on crates.io index"; then
              echo "$CRATE v$VERSION — already published (API check missed), skipping"
              exit 0
            fi

            if [ "$attempt" -lt 15 ]; then
              echo "$CRATE — publish failed, retrying in 60s..."
              sleep 60
            fi
          done

          echo "ERROR: $CRATE failed after 15 attempts"
          exit 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
