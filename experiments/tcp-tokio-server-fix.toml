name = "ringline-tcp tokio-server-fix {server_runtime}s {clients}conn {msg_size}B"

# Measures the impact of switching the tokio bench-server from io::copy (streaming
# pipe, no per-message task wake) to read_exact+write_all (one task wake per
# message, matching real server behaviour).
#
# Focus: low-to-mid connection counts where io::copy had the largest advantage
# over the ringline direct-echo path (the 8c deficit was ~33% at 1KB).
#
# 2 server_runtimes × 6 conn_counts × 5 msg_sizes = 60 variants
# ~2.6 min/variant × 60 = ~2.6 hours on z1.n.small pair

[params]
ringline_repo    = "https://github.com/brayniac/ringline"
ringline_version = "main"
port             = "7878"
server_workers   = "8"
client_threads   = "8"
warmup_duration  = "10"
test_duration    = "60"
inter_run_sleep  = "15"

[matrix]
server_runtime = ["ringline", "tokio"]
clients        = ["8", "32", "128", "256", "512", "2048"]
msg_size       = ["256", "1024", "4096", "16384", "65536"]

# ── Server job (z1.n.small) ────────────────────────────────────────────────

[[jobs]]
name = "server"
tags = ["z1.n.small"]

[[jobs.steps]]
name = "build"
type = "shell"
command = """
curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
source "$HOME/.cargo/env"
if [ -d /tmp/ringline ]; then
    cd /tmp/ringline
    git fetch --all
    git checkout {ringline_version}
    git reset --hard origin/{ringline_version}
else
    git clone {ringline_repo} /tmp/ringline
    cd /tmp/ringline
    git checkout {ringline_version}
fi
cd /tmp/ringline
cargo build --release --bin bench-server
sudo cp target/release/bench-server /usr/local/bin/bench-server
echo "bench-server build OK: $(bench-server --help 2>&1 | head -1)"
"""

[[jobs.steps]]
name = "tune-system"
type = "shell"
command = """
sudo sysctl -w net.core.somaxconn=65535
sudo sysctl -w net.ipv4.tcp_max_syn_backlog=65535
sudo sysctl -w net.core.rmem_max=134217728
sudo sysctl -w net.core.wmem_max=134217728
sudo sysctl -w net.ipv4.tcp_tw_reuse=1
sudo sysctl -w net.ipv4.tcp_fin_timeout=15
sudo sysctl -w net.ipv4.ip_local_port_range="1024 65535"
sudo fuser -k {port}/tcp 2>/dev/null || true
sleep 1
echo "System tuning complete"
"""

[[jobs.steps]]
name = "start-server"
type = "shell"
background = true
command = """
ulimit -n 500000
exec bench-server \
    --runtime {server_runtime} \
    --addr 0.0.0.0:{port} \
    --workers {server_workers} \
    --msg-size {msg_size}
"""

[[jobs.steps]]
name = "wait-for-server"
type = "shell"
command = """
for i in $(seq 1 30); do
    nc -z localhost {port} 2>/dev/null && echo "Server ready on port {port}" && exit 0
    echo "Waiting for server... ($i/30)"
    sleep 1
done
echo "ERROR: bench-server failed to start on port {port}"
exit 1
"""

[[jobs.steps]]
type = "barrier"
name = "server-ready"

[[jobs.steps]]
type = "barrier"
name = "benchmark-complete"

[[jobs.steps]]
name = "server-stats"
type = "shell"
command = """
echo "=== TCP socket stats ==="
ss -s
echo "=== Connection counts ==="
ss -tn state established | wc -l
"""

# ── Client job (z1.n.small) ────────────────────────────────────────────────

[[jobs]]
name = "client"
tags = ["z1.n.small"]

[[jobs.steps]]
name = "build"
type = "shell"
command = """
curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
source "$HOME/.cargo/env"
if [ -d /tmp/ringline ]; then
    cd /tmp/ringline
    git fetch --all
    git checkout {ringline_version}
    git reset --hard origin/{ringline_version}
else
    git clone {ringline_repo} /tmp/ringline
    cd /tmp/ringline
    git checkout {ringline_version}
fi
cd /tmp/ringline
cargo build --release --bin bench-client
sudo cp target/release/bench-client /usr/local/bin/bench-client
echo "bench-client build OK: $(bench-client --help 2>&1 | head -1)"
"""

[[jobs.steps]]
name = "tune-system"
type = "shell"
command = """
sudo sysctl -w net.core.rmem_max=134217728
sudo sysctl -w net.core.wmem_max=134217728
sudo sysctl -w net.ipv4.tcp_tw_reuse=1
sudo sysctl -w net.ipv4.tcp_fin_timeout=15
sudo sysctl -w net.ipv4.ip_local_port_range="1024 65535"
echo "Client system tuning complete"
"""

[[jobs.steps]]
type = "barrier"
name = "server-ready"

[[jobs.steps]]
name = "verify-connectivity"
type = "shell"
command = """
echo "SERVER_ADDR=$SERVER_ADDR"
for i in $(seq 1 30); do
    nc -z "$SERVER_ADDR" {port} 2>/dev/null && echo "Server reachable at $SERVER_ADDR:{port}" && exit 0
    echo "Waiting for server to be reachable... ($i/30)"
    sleep 1
done
echo "ERROR: Failed to connect to server at $SERVER_ADDR:{port}"
exit 1
"""

[[jobs.steps]]
name = "run-ringline-client"
type = "shell"
command = """
ulimit -n 500000
bench-client \
    --runtime ringline \
    --addr "$SERVER_ADDR:{port}" \
    --clients {clients} \
    --msg-size {msg_size} \
    --warmup {warmup_duration} \
    --duration {test_duration} \
    --threads {client_threads} \
    > results-ringline.json
cat results-ringline.json
"""

[[jobs.steps]]
name = "inter-run-cooldown"
type = "shell"
command = """
echo "Cooling down for {inter_run_sleep}s between ringline and tokio client runs..."
sleep {inter_run_sleep}
"""

[[jobs.steps]]
name = "run-tokio-client"
type = "shell"
command = """
ulimit -n 500000
bench-client \
    --runtime tokio \
    --addr "$SERVER_ADDR:{port}" \
    --clients {clients} \
    --msg-size {msg_size} \
    --warmup {warmup_duration} \
    --duration {test_duration} \
    --threads {client_threads} \
    > results-tokio.json
cat results-tokio.json
"""

[[jobs.steps]]
name = "upload-ringline-results"
type = "upload_artifact"
path = "results-ringline.json"

[[jobs.steps]]
name = "upload-tokio-results"
type = "upload_artifact"
path = "results-tokio.json"

[[jobs.steps]]
type = "barrier"
name = "benchmark-complete"
