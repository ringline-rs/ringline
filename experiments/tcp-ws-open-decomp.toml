name = "tcp-open-decomp {server_runtime}s {offered_rate}rps {clients}c"

# Open-loop rate sweep with the dual-timestamp decomposition (branch
# perf/bench-tick-flag). The client now prints, to stderr, a percentile
# breakdown of:
#   service  = recv - actual_send   (true wire + server latency)
#   offer_lag = actual_send - sched  (coordinated-omission / back-pressure)
# and the existing results.json carries the CO-corrected response time
# (recv - sched) = service + offer_lag.
#
# Below the saturation knee offer_lag ~ 0 (clean open loop) and the corrected
# response time equals service time. Past the knee the sender falls behind its
# fixed schedule and offer_lag climbs — that inflection is the honest capacity.
# Sweeping offered rate around the ~100-150k ops/s closed-loop ceiling brackets
# the knee for both server runtimes. 256 B, matched client=ringline (the cross
# matrix showed client runtime is irrelevant to the result), 4 server workers,
# two-machine z*.n.medium net-local rig.

[params]
ringline_repo    = "https://github.com/brayniac/ringline"
ringline_version = "perf/bench-tick-flag"
port             = "7878"
server_workers   = "4"
client_threads   = "8"
client_runtime   = "ringline"
clients          = "512"
max_inflight     = "256"
msg_size         = "256"
warmup_duration  = "5"
test_duration    = "25"

[matrix]
server_runtime = ["ringline", "tokio"]
offered_rate   = ["50000", "100000", "150000", "200000", "300000"]

# ── Server (z1.n.medium) ───────────────────────────────────────────────────

[[jobs]]
name = "server"
tags = ["z1.n.medium"]

[[jobs.steps]]
name = "build"
type = "shell"
command = """
export DEBIAN_FRONTEND=noninteractive
for i in $(seq 1 30); do sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || break; echo "apt lock held ($i)"; sleep 2; done
sudo apt-get update || true
sudo apt-get install -y git build-essential pkg-config libssl-dev cmake clang libclang-dev perl
curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
source "$HOME/.cargo/env"
if [ -d /tmp/ringline ]; then
    cd /tmp/ringline && git fetch --all && git checkout {ringline_version} && git reset --hard origin/{ringline_version}
else
    git clone {ringline_repo} /tmp/ringline && cd /tmp/ringline && git checkout {ringline_version}
fi
cd /tmp/ringline
cargo build --release --bin bench-server
sudo cp target/release/bench-server /usr/local/bin/bench-server
echo "bench-server build OK ($(git rev-parse --short HEAD))"
"""

[[jobs.steps]]
name = "tune-system"
type = "shell"
command = """
sudo sysctl -w net.core.somaxconn=65535
sudo sysctl -w net.ipv4.tcp_max_syn_backlog=65535
sudo sysctl -w net.core.rmem_max=134217728
sudo sysctl -w net.core.wmem_max=134217728
sudo fuser -k {port}/tcp 2>/dev/null || true
sleep 1
echo "tuned"
"""

[[jobs.steps]]
name = "start-server"
type = "shell"
background = true
command = """
ulimit -n 500000
exec bench-server --runtime {server_runtime} --addr 0.0.0.0:{port} --workers {server_workers} --msg-size {msg_size}
"""

[[jobs.steps]]
name = "wait-for-server"
type = "shell"
command = """
for i in $(seq 1 30); do
    nc -z localhost {port} 2>/dev/null && echo "ready" && exit 0
    sleep 1
done
echo "ERROR: server did not start"; exit 1
"""

[[jobs.steps]]
type = "barrier"
name = "server-ready"

[[jobs.steps]]
type = "barrier"
name = "benchmark-complete"

[[jobs.steps]]
name = "graceful-stop"
type = "shell"
command = "sudo pkill -TERM -x bench-server 2>/dev/null || true; sleep 4; echo stopped"

# ── Client (z2.n.medium) ───────────────────────────────────────────────────

[[jobs]]
name = "client"
tags = ["z2.n.medium"]

[[jobs.steps]]
name = "build"
type = "shell"
command = """
export DEBIAN_FRONTEND=noninteractive
for i in $(seq 1 30); do sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || break; echo "apt lock held ($i)"; sleep 2; done
sudo apt-get update || true
sudo apt-get install -y git build-essential pkg-config libssl-dev cmake clang libclang-dev perl
curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
source "$HOME/.cargo/env"
if [ -d /tmp/ringline ]; then
    cd /tmp/ringline && git fetch --all && git checkout {ringline_version} && git reset --hard origin/{ringline_version}
else
    git clone {ringline_repo} /tmp/ringline && cd /tmp/ringline && git checkout {ringline_version}
fi
cd /tmp/ringline
cargo build --release --bin bench-client
sudo cp target/release/bench-client /usr/local/bin/bench-client
echo "bench-client build OK"
"""

[[jobs.steps]]
name = "tune-system"
type = "shell"
command = """
sudo sysctl -w net.core.rmem_max=134217728
sudo sysctl -w net.core.wmem_max=134217728
sudo sysctl -w net.ipv4.tcp_tw_reuse=1
sudo sysctl -w net.ipv4.ip_local_port_range="1024 65535"
echo "tuned"
"""

[[jobs.steps]]
type = "barrier"
name = "server-ready"

[[jobs.steps]]
name = "verify-connectivity"
type = "shell"
command = """
for i in $(seq 1 30); do
    nc -z "$SERVER_ADDR" {port} 2>/dev/null && echo "reachable" && exit 0
    sleep 1
done
echo "ERROR: cannot reach $SERVER_ADDR:{port}"; exit 1
"""

# Capture stdout (results.json: CO-corrected response time + ops/s) AND stderr
# (the [openloop-decomp] service/offer_lag percentile lines) separately.
[[jobs.steps]]
name = "run-benchmark"
type = "shell"
command = """
ulimit -n 500000
bench-client --runtime {client_runtime} --addr "$SERVER_ADDR:{port}" --clients {clients} --msg-size {msg_size} --warmup {warmup_duration} --duration {test_duration} --threads {client_threads} --open --rate {offered_rate} --max-inflight {max_inflight} > results.json 2> decomp.txt
echo "=== results.json ==="; cat results.json
echo "=== decomp (stderr) ==="; grep openloop-decomp decomp.txt || cat decomp.txt
"""

[[jobs.steps]]
name = "upload-results"
type = "upload_artifact"
path = "results.json"

[[jobs.steps]]
name = "upload-decomp"
type = "upload_artifact"
path = "decomp.txt"

[[jobs.steps]]
type = "barrier"
name = "benchmark-complete"
