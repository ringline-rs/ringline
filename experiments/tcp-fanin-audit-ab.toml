name = "fanin-audit-ab {arm} {server_runtime}s {clients}c"

# Post-audit A/B of the fan-in service-latency finding
# ([[project_server_latency_finding]]) on the BAREMETAL pair (anvil control
# plane is down; hv01/hv02 agents idle). Same open-loop dual-timestamp
# decomposition and 50k rps sub-saturation shape as the June fan-in sweep,
# with an explicit pre/post-audit arm:
#
#   arm=pre  -> bench/fanin-pre  (main @ 8d407d5, audit-day baseline)
#   arm=post -> main             (all audit fixes: #236-#246, incl. the
#                                 no-block-with-ready-queue loop fix and the
#                                 accumulator rewind)
#
# server = hv02 (z1.baremetal, 1950X), pinned CPUs 0-7  (X710-local NUMA0;
#          GPU VM owns 12-15/28-31)
# client = hv01 (z2.baremetal, 3970X), pinned CPUs 16-23 (X710-local NUMA2;
#          GPU VM owns NUMA0)
# Data plane hardcoded to 10.1.0.2 (X710 bridge) — agent_addr autodetect not
# trusted for the bench path.
#
# NOTE: absolute numbers are NOT comparable to the June .n.medium VM runs
# (different topology, PF vs VF). The comparisons that matter are within
# this experiment: pre-vs-post per cell, and the ringline-vs-tokio gap
# trend across the fan-in sweep.

[params]
ringline_repo   = "https://github.com/brayniac/ringline"
server_addr     = "10.1.0.2"
port            = "7878"
server_workers  = "4"
server_cpus     = "0-7"
client_cpus     = "16-23"
client_threads  = "8"
client_runtime  = "ringline"
offered_rate    = "50000"
max_inflight    = "256"
msg_size        = "256"
warmup_duration = "5"
test_duration   = "25"

[matrix]
arm            = ["pre", "post"]
server_runtime = ["ringline", "tokio"]
clients        = ["32", "64", "128", "256", "512"]

# ── Server (hv02) ──────────────────────────────────────────────────────────

[[jobs]]
name = "server"
tags = ["z1.baremetal"]

[[jobs.steps]]
name = "build"
type = "shell"
command = """
export DEBIAN_FRONTEND=noninteractive
case "{arm}" in
    pre)  REF=bench/fanin-pre ;;
    post) REF=main ;;
esac
if ! command -v cargo >/dev/null && [ ! -f "$HOME/.cargo/env" ]; then
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
fi
source "$HOME/.cargo/env"
DIR=/tmp/ringline-{arm}
if [ -d "$DIR" ]; then
    cd "$DIR" && git fetch --all && git checkout "$REF" && git reset --hard "origin/$REF"
else
    git clone {ringline_repo} "$DIR" && cd "$DIR" && git checkout "$REF"
fi
cd "$DIR"
cargo build --release --bin bench-server
sudo cp target/release/bench-server /usr/local/bin/bench-server
echo "bench-server build OK ({arm} = $(git rev-parse --short HEAD))"
"""

[[jobs.steps]]
name = "tune-system"
type = "shell"
command = """
sudo sysctl -w net.core.somaxconn=65535
sudo sysctl -w net.ipv4.tcp_max_syn_backlog=65535
sudo sysctl -w net.core.rmem_max=134217728
sudo sysctl -w net.core.wmem_max=134217728
sudo fuser -k {port}/tcp 2>/dev/null || true
sleep 1
echo "tuned"
"""

[[jobs.steps]]
name = "start-server"
type = "shell"
background = true
command = """
ulimit -n 500000
exec taskset -c {server_cpus} bench-server --runtime {server_runtime} --addr 0.0.0.0:{port} --workers {server_workers} --msg-size {msg_size}
"""

[[jobs.steps]]
name = "wait-for-server"
type = "shell"
command = """
for i in $(seq 1 30); do
    nc -z localhost {port} 2>/dev/null && echo "ready" && exit 0
    sleep 1
done
echo "ERROR: server did not start"; exit 1
"""

[[jobs.steps]]
type = "barrier"
name = "server-ready"

[[jobs.steps]]
type = "barrier"
name = "benchmark-complete"

[[jobs.steps]]
name = "graceful-stop"
type = "shell"
command = "sudo pkill -TERM -x bench-server 2>/dev/null || true; sleep 4; echo stopped"

# ── Client (hv01) ──────────────────────────────────────────────────────────

[[jobs]]
name = "client"
tags = ["z2.baremetal"]

[[jobs.steps]]
name = "build"
type = "shell"
command = """
export DEBIAN_FRONTEND=noninteractive
case "{arm}" in
    pre)  REF=bench/fanin-pre ;;
    post) REF=main ;;
esac
if ! command -v cargo >/dev/null && [ ! -f "$HOME/.cargo/env" ]; then
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
fi
source "$HOME/.cargo/env"
DIR=/tmp/ringline-{arm}
if [ -d "$DIR" ]; then
    cd "$DIR" && git fetch --all && git checkout "$REF" && git reset --hard "origin/$REF"
else
    git clone {ringline_repo} "$DIR" && cd "$DIR" && git checkout "$REF"
fi
cd "$DIR"
cargo build --release --bin bench-client
sudo cp target/release/bench-client /usr/local/bin/bench-client
echo "bench-client build OK ({arm} = $(git rev-parse --short HEAD))"
"""

[[jobs.steps]]
name = "tune-system"
type = "shell"
command = """
sudo sysctl -w net.core.rmem_max=134217728
sudo sysctl -w net.core.wmem_max=134217728
sudo sysctl -w net.ipv4.tcp_tw_reuse=1
sudo sysctl -w net.ipv4.ip_local_port_range="1024 65535"
echo "tuned"
"""

[[jobs.steps]]
type = "barrier"
name = "server-ready"

[[jobs.steps]]
name = "verify-connectivity"
type = "shell"
command = """
for i in $(seq 1 30); do
    nc -z {server_addr} {port} 2>/dev/null && echo "reachable" && exit 0
    sleep 1
done
echo "ERROR: cannot reach {server_addr}:{port}"; exit 1
"""

[[jobs.steps]]
name = "run-benchmark"
type = "shell"
command = """
ulimit -n 500000
taskset -c {client_cpus} bench-client --runtime {client_runtime} --addr "{server_addr}:{port}" --clients {clients} --msg-size {msg_size} --warmup {warmup_duration} --duration {test_duration} --threads {client_threads} --open --rate {offered_rate} --max-inflight {max_inflight} > results.json 2> decomp.txt
echo "=== results.json ==="; cat results.json
echo "=== decomp (stderr) ==="; grep openloop-decomp decomp.txt || cat decomp.txt
"""

[[jobs.steps]]
name = "upload-results"
type = "upload_artifact"
path = "results.json"

[[jobs.steps]]
name = "upload-decomp"
type = "upload_artifact"
path = "decomp.txt"

[[jobs.steps]]
type = "barrier"
name = "benchmark-complete"
