name = "ringline-tcp chunk-size-sweep cs{chunk_size} {clients}conn 4KB"

# Sweep conn_chunk_size across connection counts to find the optimal packing factor.
#
# With chunk_size=32 and 32 connections on 8 workers, all 32 connections land on
# worker 0 — causing a 0.58 rl/tok ratio (down from 0.89 at 8 connections).
# This experiment sweeps chunk_size=[1..32] at clients=[8..256] to find the
# sweet spot between CQE batching benefit and single-worker saturation.
#
# Fixed: server_runtime=ringline, msg_size=4096, 8 workers each side.
# Matrix: 6 chunk_sizes × 6 client_counts = 36 variants.
# ~1.5 hours on z1.n.small pair.
#
# Analysis: for each (clients, chunk_size), compare rl_client vs tok_client ops/s
# against the ringline server. Optimal chunk_size maximizes rl/tok ratio.

[params]
ringline_repo    = "https://github.com/brayniac/ringline"
ringline_version = "main"
port             = "7878"
server_workers   = "8"
client_threads   = "8"
msg_size         = "4096"
warmup_duration  = "10"
test_duration    = "60"
inter_run_sleep  = "15"

[matrix]
chunk_size = ["1", "2", "4", "8", "16", "32"]
clients    = ["8", "16", "32", "64", "128", "256"]

# ── Server job (z1.n.small) ────────────────────────────────────────────────

[[jobs]]
name = "server"
tags = ["z1.n.small"]

[[jobs.steps]]
name = "build"
type = "shell"
command = """
curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
source "$HOME/.cargo/env"
if [ -d /tmp/ringline ]; then
    cd /tmp/ringline
    git fetch --all
    git checkout {ringline_version}
    git reset --hard origin/{ringline_version}
else
    git clone {ringline_repo} /tmp/ringline
    cd /tmp/ringline
    git checkout {ringline_version}
fi
cd /tmp/ringline
cargo build --release --bin bench-server
sudo cp target/release/bench-server /usr/local/bin/bench-server
echo "bench-server build OK"
"""

[[jobs.steps]]
name = "tune-system"
type = "shell"
command = """
sudo sysctl -w net.core.somaxconn=65535
sudo sysctl -w net.ipv4.tcp_max_syn_backlog=65535
sudo sysctl -w net.core.rmem_max=134217728
sudo sysctl -w net.core.wmem_max=134217728
sudo sysctl -w net.ipv4.tcp_tw_reuse=1
sudo sysctl -w net.ipv4.tcp_fin_timeout=15
sudo sysctl -w net.ipv4.ip_local_port_range="1024 65535"
sudo fuser -k {port}/tcp 2>/dev/null || true
sleep 1
echo "System tuning complete"
"""

[[jobs.steps]]
name = "start-server"
type = "shell"
background = true
command = """
ulimit -n 500000
exec bench-server \
    --runtime ringline \
    --addr 0.0.0.0:{port} \
    --workers {server_workers} \
    --msg-size {msg_size} \
    --conn-chunk-size {chunk_size}
"""

[[jobs.steps]]
name = "wait-for-server"
type = "shell"
command = """
for i in $(seq 1 30); do
    nc -z localhost {port} 2>/dev/null && echo "Server ready on port {port}" && exit 0
    echo "Waiting for server... ($i/30)"
    sleep 1
done
echo "ERROR: bench-server failed to start"
exit 1
"""

[[jobs.steps]]
type = "barrier"
name = "server-ready"

[[jobs.steps]]
type = "barrier"
name = "benchmark-complete"

[[jobs.steps]]
name = "server-stats"
type = "shell"
command = """
echo "=== TCP socket stats ==="
ss -s
echo "=== Connection counts ==="
ss -tn state established | wc -l
"""

# ── Client job (z1.n.small) ────────────────────────────────────────────────

[[jobs]]
name = "client"
tags = ["z1.n.small"]

[[jobs.steps]]
name = "build"
type = "shell"
command = """
curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
source "$HOME/.cargo/env"
if [ -d /tmp/ringline ]; then
    cd /tmp/ringline
    git fetch --all
    git checkout {ringline_version}
    git reset --hard origin/{ringline_version}
else
    git clone {ringline_repo} /tmp/ringline
    cd /tmp/ringline
    git checkout {ringline_version}
fi
cd /tmp/ringline
cargo build --release --bin bench-client
sudo cp target/release/bench-client /usr/local/bin/bench-client
echo "bench-client build OK"
"""

[[jobs.steps]]
name = "tune-system"
type = "shell"
command = """
sudo sysctl -w net.core.rmem_max=134217728
sudo sysctl -w net.core.wmem_max=134217728
sudo sysctl -w net.ipv4.tcp_tw_reuse=1
sudo sysctl -w net.ipv4.tcp_fin_timeout=15
sudo sysctl -w net.ipv4.ip_local_port_range="1024 65535"
echo "Client system tuning complete"
"""

[[jobs.steps]]
type = "barrier"
name = "server-ready"

[[jobs.steps]]
name = "verify-connectivity"
type = "shell"
command = """
echo "SERVER_ADDR=$SERVER_ADDR"
for i in $(seq 1 30); do
    nc -z "$SERVER_ADDR" {port} 2>/dev/null && echo "Server reachable" && exit 0
    sleep 1
done
echo "ERROR: Failed to connect"
exit 1
"""

[[jobs.steps]]
name = "run-ringline-client"
type = "shell"
command = """
ulimit -n 500000
bench-client \
    --runtime ringline \
    --addr "$SERVER_ADDR:{port}" \
    --clients {clients} \
    --msg-size {msg_size} \
    --warmup {warmup_duration} \
    --duration {test_duration} \
    --threads {client_threads} \
    --conn-chunk-size {chunk_size} \
    > results-ringline.json
cat results-ringline.json
"""

[[jobs.steps]]
name = "inter-run-cooldown"
type = "shell"
command = """
sleep {inter_run_sleep}
"""

[[jobs.steps]]
name = "run-tokio-client"
type = "shell"
command = """
ulimit -n 500000
bench-client \
    --runtime tokio \
    --addr "$SERVER_ADDR:{port}" \
    --clients {clients} \
    --msg-size {msg_size} \
    --warmup {warmup_duration} \
    --duration {test_duration} \
    --threads {client_threads} \
    > results-tokio.json
cat results-tokio.json
"""

[[jobs.steps]]
name = "upload-ringline-results"
type = "upload_artifact"
path = "results-ringline.json"

[[jobs.steps]]
name = "upload-tokio-results"
type = "upload_artifact"
path = "results-tokio.json"

[[jobs.steps]]
type = "barrier"
name = "benchmark-complete"
