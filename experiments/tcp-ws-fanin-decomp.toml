name = "tcp-fanin {server_runtime}s {clients}c 50krps"

# Fan-in confirmation for the open-loop service-latency finding.
# Holds offered rate at 50k rps (safely below the ~100k knee at every conn
# count) and sweeps connection count 32..512 for each server runtime, with the
# dual-timestamp decomposition (branch perf/bench-tick-flag). Client fixed to
# ringline. Prediction: ringline's CO-clean service p50 rises with connection
# count and CROSSES tokio's between 64c and 512c — pinning the latency to
# per-iteration conns/worker (fan-in), not a flat server penalty. offer_lag
# should stay small (~tens of us) at all cells since 50k is sub-saturation.

[params]
ringline_repo    = "https://github.com/brayniac/ringline"
ringline_version = "perf/bench-tick-flag"
port             = "7878"
server_workers   = "4"
client_threads   = "8"
client_runtime   = "ringline"
offered_rate     = "50000"
max_inflight     = "256"
msg_size         = "256"
warmup_duration  = "5"
test_duration    = "25"

[matrix]
server_runtime = ["ringline", "tokio"]
clients        = ["32", "64", "128", "256", "512"]

# ── Server (z1.n.medium) ───────────────────────────────────────────────────

[[jobs]]
name = "server"
tags = ["z1.n.medium"]

[[jobs.steps]]
name = "build"
type = "shell"
command = """
export DEBIAN_FRONTEND=noninteractive
for i in $(seq 1 30); do sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || break; echo "apt lock held ($i)"; sleep 2; done
sudo apt-get update || true
sudo apt-get install -y git build-essential pkg-config libssl-dev cmake clang libclang-dev perl
curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
source "$HOME/.cargo/env"
if [ -d /tmp/ringline ]; then
    cd /tmp/ringline && git fetch --all && git checkout {ringline_version} && git reset --hard origin/{ringline_version}
else
    git clone {ringline_repo} /tmp/ringline && cd /tmp/ringline && git checkout {ringline_version}
fi
cd /tmp/ringline
cargo build --release --bin bench-server
sudo cp target/release/bench-server /usr/local/bin/bench-server
echo "bench-server build OK ($(git rev-parse --short HEAD))"
"""

[[jobs.steps]]
name = "tune-system"
type = "shell"
command = """
sudo sysctl -w net.core.somaxconn=65535
sudo sysctl -w net.ipv4.tcp_max_syn_backlog=65535
sudo sysctl -w net.core.rmem_max=134217728
sudo sysctl -w net.core.wmem_max=134217728
sudo fuser -k {port}/tcp 2>/dev/null || true
sleep 1
echo "tuned"
"""

[[jobs.steps]]
name = "start-server"
type = "shell"
background = true
command = """
ulimit -n 500000
exec bench-server --runtime {server_runtime} --addr 0.0.0.0:{port} --workers {server_workers} --msg-size {msg_size}
"""

[[jobs.steps]]
name = "wait-for-server"
type = "shell"
command = """
for i in $(seq 1 30); do
    nc -z localhost {port} 2>/dev/null && echo "ready" && exit 0
    sleep 1
done
echo "ERROR: server did not start"; exit 1
"""

[[jobs.steps]]
type = "barrier"
name = "server-ready"

[[jobs.steps]]
type = "barrier"
name = "benchmark-complete"

[[jobs.steps]]
name = "graceful-stop"
type = "shell"
command = "sudo pkill -TERM -x bench-server 2>/dev/null || true; sleep 4; echo stopped"

# ── Client (z2.n.medium) ───────────────────────────────────────────────────

[[jobs]]
name = "client"
tags = ["z2.n.medium"]

[[jobs.steps]]
name = "build"
type = "shell"
command = """
export DEBIAN_FRONTEND=noninteractive
for i in $(seq 1 30); do sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || break; echo "apt lock held ($i)"; sleep 2; done
sudo apt-get update || true
sudo apt-get install -y git build-essential pkg-config libssl-dev cmake clang libclang-dev perl
curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
source "$HOME/.cargo/env"
if [ -d /tmp/ringline ]; then
    cd /tmp/ringline && git fetch --all && git checkout {ringline_version} && git reset --hard origin/{ringline_version}
else
    git clone {ringline_repo} /tmp/ringline && cd /tmp/ringline && git checkout {ringline_version}
fi
cd /tmp/ringline
cargo build --release --bin bench-client
sudo cp target/release/bench-client /usr/local/bin/bench-client
echo "bench-client build OK"
"""

[[jobs.steps]]
name = "tune-system"
type = "shell"
command = """
sudo sysctl -w net.core.rmem_max=134217728
sudo sysctl -w net.core.wmem_max=134217728
sudo sysctl -w net.ipv4.tcp_tw_reuse=1
sudo sysctl -w net.ipv4.ip_local_port_range="1024 65535"
echo "tuned"
"""

[[jobs.steps]]
type = "barrier"
name = "server-ready"

[[jobs.steps]]
name = "verify-connectivity"
type = "shell"
command = """
for i in $(seq 1 30); do
    nc -z "$SERVER_ADDR" {port} 2>/dev/null && echo "reachable" && exit 0
    sleep 1
done
echo "ERROR: cannot reach $SERVER_ADDR:{port}"; exit 1
"""

[[jobs.steps]]
name = "run-benchmark"
type = "shell"
command = """
ulimit -n 500000
bench-client --runtime {client_runtime} --addr "$SERVER_ADDR:{port}" --clients {clients} --msg-size {msg_size} --warmup {warmup_duration} --duration {test_duration} --threads {client_threads} --open --rate {offered_rate} --max-inflight {max_inflight} > results.json 2> decomp.txt
echo "=== results.json ==="; cat results.json
echo "=== decomp (stderr) ==="; grep openloop-decomp decomp.txt || cat decomp.txt
"""

[[jobs.steps]]
name = "upload-results"
type = "upload_artifact"
path = "results.json"

[[jobs.steps]]
name = "upload-decomp"
type = "upload_artifact"
path = "decomp.txt"

[[jobs.steps]]
type = "barrier"
name = "benchmark-complete"
